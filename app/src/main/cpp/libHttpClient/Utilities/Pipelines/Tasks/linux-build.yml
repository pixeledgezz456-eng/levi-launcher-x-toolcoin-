parameters:
  - name: configuration
    type: string

steps:
  - template: checkout.yml

  - task: Bash@3
    displayName: 'Ensure libHttpClient dependencies installed'
    inputs:
      filePath: './Build/libHttpClient.Linux/install_dependencies.bash'

  - task: Bash@3
    displayName: 'Build and install OpenSSL'
    inputs:
      filePath: './Build/libHttpClient.Linux/openssl_Linux.bash'
      arguments: '-c ${{ parameters.configuration }}'

  - task: Bash@3
    displayName: 'Build libcurl'
    inputs:
      filePath: './Build/libHttpClient.Linux/curl_Linux.bash'
      arguments: '-c ${{ parameters.configuration }}'

  - task: Bash@3
    displayName: 'Build libHttpClient Static'
    inputs:
      filePath: './Build/libHttpClient.Linux/libHttpClient_Linux.bash'
      arguments: '-c ${{ parameters.configuration }} -nc -ns -st'

  - task: Bash@3
    displayName: 'Run libHttpClient Linux tests (ctest)'
    inputs:
      targetType: 'inline'
      script: |
        set -e
        cd "$(Build.SourcesDirectory)/Int/CMake/libHttpClient.Linux"
        # Run every test labelled "taskqueue" so new regression scenarios are
        # picked up automatically just by adding the label in CMake (no pipeline
        # change needed).
        ctest --output-on-failure -L taskqueue

  - task: Bash@3
    displayName: 'Build libHttpClient Shared'
    inputs:
      filePath: './Build/libHttpClient.Linux/libHttpClient_Linux.bash'
      arguments: '-c ${{ parameters.configuration }} -nc -ns'
